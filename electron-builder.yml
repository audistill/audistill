appId: com.audistill.app
productName: Audistill
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!.scratch/*'
  - '!.claude/*'
  - '!docs/*'
  - '!tests/*'
  - '!prototypes/*'
  - '!scripts/*'
  - '!ralph-*'
  - '!CLAUDE.md'
  - '!CONTEXT.md'
  - '!vitest.config.ts'
  - '!components.json'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,tsconfig.node.tsbuildinfo,tsconfig.web.tsbuildinfo}'
  - '!node_modules/onnxruntime-node/bin/napi-v6/linux'
  - '!node_modules/onnxruntime-node/bin/napi-v6/win32'
asarUnpack:
  - 'node_modules/ffmpeg-static/ffmpeg'
  - 'node_modules/onnxruntime-node/bin/**'
  - 'node_modules/better-sqlite3/build/**'
afterSign: ./scripts/fix-ad-hoc-signing.cjs
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Application needs access to open audio files.
  notarize: false
  target:
    - target: dmg
      arch:
        - arm64
