<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-labelledby="c4-title">
  <title id="c4-title">Audistill Logo Mark - Waveform to Drop</title>
  <!-- Concept 4: A waveform that morphs into a drop shape — the transformation narrative -->
  <defs>
    <linearGradient id="wave-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97757;stop-opacity:0.4" />
      <stop offset="60%" style="stop-color:#d97757;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#d97757;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Single path: starts as scattered waveform bars on left, converges to drop shape on right -->
  <!-- Left side: audio bars -->
  <rect x="10" y="38" width="3" height="24" rx="1.5" fill="#d97757" opacity="0.35"/>
  <rect x="17" y="32" width="3" height="36" rx="1.5" fill="#d97757" opacity="0.45"/>
  <rect x="24" y="28" width="3" height="44" rx="1.5" fill="#d97757" opacity="0.55"/>
  <rect x="31" y="34" width="3" height="32" rx="1.5" fill="#d97757" opacity="0.65"/>
  <rect x="38" y="30" width="3" height="40" rx="1.5" fill="#d97757" opacity="0.75"/>

  <!-- Arrow/flow indicator -->
  <path d="M46,50 L54,50" stroke="#d97757" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M51,47 L54,50 L51,53" stroke="#d97757" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>

  <!-- Right side: the refined drop -->
  <path d="M72,22 C72,22 90,50 90,62 C90,72 82,80 72,80 C62,80 54,72 54,62 C54,50 72,22 72,22 Z" fill="#d97757"/>
  <ellipse cx="68" cy="52" rx="4" ry="6" fill="#e89b7f" opacity="0.4"/>
</svg>
