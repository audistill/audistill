    <line x1="38" y1="55" x2="38" y2="69" stroke="#faf9f5" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="46" y1="50" x2="46" y2="74" stroke="#faf9f5" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="54" y1="48" x2="54" y2="76" stroke="#faf9f5" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="62" y1="52" x2="62" y2="72" stroke="#faf9f5" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  </g>
  <!-- Wordmark -->
