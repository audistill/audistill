<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-labelledby="logo-h-title">
  <title id="logo-h-title">Audistill Logo Horizontal</title>
  <defs>
    <linearGradient id="drop-grad-h" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e89b7f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97757;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Mark -->
  <g transform="translate(8, 4) scale(0.72)">
