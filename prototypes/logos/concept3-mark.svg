<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-labelledby="c3-title">
  <title id="c3-title">Audistill Logo Mark - Ripple Drop</title>
  <!-- Concept 3: Minimal — a single drop creating ripples (knowledge spreading from a concentrated source) -->

  <!-- Ripple rings -->
  <circle cx="50" cy="58" rx="38" ry="12" fill="none" stroke="#d97757" stroke-width="1.5" opacity="0.25"
    style="transform-origin: 50px 58px;" />
  <ellipse cx="50" cy="58" rx="28" ry="9" fill="none" stroke="#d97757" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="50" cy="58" rx="18" ry="6" fill="none" stroke="#d97757" stroke-width="1.8" opacity="0.6"/>

  <!-- The drop itself — falling into center -->
  <path d="M50,16 C50,16 60,35 60,42 C60,47.5 55.5,52 50,52 C44.5,52 40,47.5 40,42 C40,35 50,16 50,16 Z" fill="#d97757"/>
  <!-- Highlight on drop -->
  <ellipse cx="47" cy="36" rx="3" ry="4" fill="#e89b7f" opacity="0.5"/>
</svg>
