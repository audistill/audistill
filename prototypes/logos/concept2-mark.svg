<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-labelledby="c2-title">
  <title id="c2-title">Audistill Logo Mark - Funnel/Filter</title>
  <defs>
    <linearGradient id="funnel-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d97757;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#d97757;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Concept 2: Audio waves flowing into a funnel/distillation vessel, becoming a single refined drop -->

  <!-- Scattered audio waves at top (raw audio) -->
  <line x1="25" y1="12" x2="25" y2="24" stroke="#d97757" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="35" y1="8" x2="35" y2="28" stroke="#d97757" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="45" y1="10" x2="45" y2="26" stroke="#d97757" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="55" y1="6" x2="55" y2="30" stroke="#d97757" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="65" y1="9" x2="65" y2="27" stroke="#d97757" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="75" y1="11" x2="75" y2="25" stroke="#d97757" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Funnel/vessel shape -->
  <path d="M18,34 L82,34 L58,68 L58,80 L42,80 L42,68 Z" fill="url(#funnel-grad)" stroke="none"/>

  <!-- Refined drop falling from funnel -->
  <ellipse cx="50" cy="90" rx="6" ry="7" fill="#d97757"/>
  <ellipse cx="48" cy="87" rx="2" ry="2.5" fill="#e89b7f" opacity="0.6"/>
</svg>
