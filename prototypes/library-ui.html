<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audistill — Library Prototype</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#141413',
            text: '#faf9f5',
            secondary: '#c2c0b8',
            surface: '#1e1e1c',
            accent: '#d97757',
          },
          fontFamily: {
            heading: ['Poppins', 'sans-serif'],
            body: ['-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
          },
          borderRadius: {
            app: '12px',
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: #141413; color: #faf9f5; overflow: hidden; height: 100vh; }
    .font-heading { font-family: 'Poppins', sans-serif; }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3a3a38; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #5a5a58; }

    /* Tab preview (italic) */
    .tab-preview { font-style: italic; opacity: 0.8; }

    /* Editable title hover */
    .editable-title .pencil-icon { opacity: 0; transition: opacity 0.15s; }
    .editable-title:hover .pencil-icon { opacity: 1; }

    /* Sidebar item hover */
    .sidebar-item { transition: background 0.1s; }
    .sidebar-item:hover { background: #2a2a28; }
    .sidebar-item.active { background: #2a2a28; }

    /* Folder expand animation */
    .folder-children { overflow: hidden; transition: max-height 0.2s ease; }
    .folder-children.collapsed { max-height: 0; }
    .folder-children.expanded { max-height: 500px; }

    /* Traffic lights */
    .traffic-light { width: 12px; height: 12px; border-radius: 50%; }

    /* Processing animation */
    @keyframes pulse-dot { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    .processing-dot { animation: pulse-dot 1.5s infinite; }

    /* Transcript expand */
    .transcript-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .transcript-body.expanded { max-height: 600px; overflow-y: auto; }
  </style>
</head>
<body>
  <div id="app" class="flex flex-col h-screen">

    <!-- Title bar with traffic lights -->
    <div class="flex items-center h-10 px-4 bg-bg border-b border-surface select-none shrink-0" style="-webkit-app-region: drag;">
      <div class="flex gap-2 mr-4">
        <div class="traffic-light bg-[#ff5f57]"></div>
        <div class="traffic-light bg-[#febc2e]"></div>
        <div class="traffic-light bg-[#28c840]"></div>
      </div>

      <!-- Tab bar -->
      <div id="tab-bar" class="flex items-center gap-1 ml-2 overflow-x-auto">
        <!-- Tabs injected by JS -->
      </div>
    </div>

    <!-- Main content area -->
    <div class="flex flex-1 overflow-hidden">

      <!-- Sidebar -->
      <div class="w-[280px] shrink-0 bg-bg border-r border-surface flex flex-col overflow-hidden">

        <!-- Sidebar header -->
        <div class="p-3 flex items-center justify-between shrink-0">
          <span class="font-heading text-sm font-semibold text-text">Audistill</span>
          <div class="flex items-center gap-1">
            <button onclick="openSettings()" class="flex items-center justify-center w-7 h-7 rounded-lg text-secondary hover:text-text hover:bg-surface transition-colors" title="Settings">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <button onclick="addFile()" class="flex items-center gap-1 px-2 py-1 rounded-app text-xs font-medium text-accent hover:bg-surface transition-colors">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
              Add
            </button>
          </div>
        </div>

        <!-- Search -->
        <div class="px-3 pb-3 shrink-0">
          <div class="flex items-center gap-2 px-3 py-2 rounded-app bg-surface text-secondary text-xs">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" placeholder="Search episodes..." class="bg-transparent outline-none w-full text-text placeholder-secondary" oninput="filterSidebar(this.value)">
          </div>
        </div>

        <!-- Sidebar tree -->
        <div id="sidebar-tree" class="flex-1 overflow-y-auto px-2 pb-4">
          <!-- Injected by JS -->
        </div>
      </div>

      <!-- Content pane -->
      <div id="content-pane" class="flex-1 flex flex-col overflow-hidden bg-bg">
        <!-- Injected by JS -->
      </div>
    </div>
  </div>

  <script>
    // --- DATA ---
    const episodes = [
      {
        id: 'ep1',
        title: 'How Transformers Changed NLP Forever',
        file: 'lex-fridman-ep412.mp3',
        duration: '2h 14m',
        date: 'May 28, 2026',
        status: 'complete',
        folder: 'podcasts',
        summary: {
          rundown: 'Lex Fridman interviews Ilya Sutskever about the invention of the transformer architecture, its unexpected scaling properties, and why attention mechanisms turned out to be the key insight that unified language understanding.',
          details: [
            'The original "Attention Is All You Need" paper was rejected from two conferences before acceptance at NeurIPS 2017',
            'Scaling laws were discovered accidentally — a training run left on overnight showed loss decreasing faster than any known curve',
            'Sutskever argues that next-token prediction implicitly requires world models, not just pattern matching',
            'Current models use ~10,000x more compute than the original transformer but the architecture is essentially unchanged',
            'The "bitter lesson" of AI: general methods that leverage computation ultimately win over human-engineered features'
          ],
          whyItMatters: 'This conversation is essential context for understanding why the AI industry bet everything on scale. Sutskever\'s argument that prediction equals understanding — if true — means we may already have the architecture for AGI and just need more compute. If wrong, we\'re headed for a wall that no amount of hardware can fix.'
        },
        transcript: [
          { time: '00:00', text: 'Welcome to the Lex Fridman podcast. Today I have the pleasure of speaking with Ilya Sutskever...' },
          { time: '02:34', text: 'Let me take you back to 2016. We were working on sequence to sequence models and something wasn\'t clicking...' },
          { time: '05:12', text: 'The key insight was that attention could replace recurrence entirely. That was the controversial claim...' },
          { time: '08:45', text: 'When we first saw the scaling curves, honestly, we didn\'t believe them. We thought there was a bug...' },
          { time: '12:30', text: 'People often ask me about consciousness and whether these models truly understand. Here\'s my perspective...' },
        ]
      },
      {
        id: 'ep2',
        title: 'Building a Second Brain: The PARA Method',
        file: 'building-second-brain-ch4.m4a',
        duration: '47m',
        date: 'May 25, 2026',
        status: 'complete',
        folder: 'books',
        summary: {
          rundown: 'Tiago Forte explains the PARA organizational system — Projects, Areas, Resources, Archives — and argues that organizing information by actionability rather than topic is the key to a useful personal knowledge management system.',
          details: [
            'PARA stands for Projects (active, with deadlines), Areas (ongoing responsibilities), Resources (topics of interest), Archives (inactive items from the other three)',
            'The "slow burn" approach: collect notes over weeks/months before a project needs them, rather than doing all research at once',
            'Forte recommends no more than 12 active notes in any folder — the "dozen rule" forces prioritization',
            'Progressive summarization: highlight in layers (bold → highlight → executive summary) so future-you can scan at the right depth'
          ],
          whyItMatters: 'PARA gives a concrete framework for the folder structure in knowledge tools like Audistill itself. The "actionability over topic" principle challenges the instinct to organize by subject — instead, what are you working on right now?'
        },
        transcript: [
          { time: '00:00', text: 'Chapter four. The PARA method. Let me explain why I think most organizational systems fail...' },
          { time: '03:15', text: 'Projects are the most important category. A project has a deadline and a clear outcome...' },
          { time: '07:22', text: 'Areas are different. These are ongoing responsibilities with a standard to maintain...' },
        ]
      },
      {
        id: 'ep3',
        title: 'The Psychology of Money: Compounding and Patience',
        file: 'psychology-of-money-morgan-housel.mp3',
        duration: '1h 12m',
        date: 'May 20, 2026',
        status: 'complete',
        folder: 'podcasts',
        summary: {
          rundown: 'Morgan Housel argues that financial success is more about behavior than knowledge — specifically, the ability to do nothing and let compounding work over decades is the single most underrated skill in wealth building.',
          details: [
            'Warren Buffett\'s net worth is 97% attributable to investing after age 65 — the power of compounding requires extreme patience',
            'The highest-earning hedge fund managers underperform buy-and-hold index investors over 30-year periods due to fees and timing errors',
            'Housel distinguishes "getting wealthy" (optimism, risk-taking) from "staying wealthy" (paranoia, frugality) — they require opposite mindsets',
            'Tail events drive everything: the best 50 trading days in a 40-year period account for virtually all market gains'
          ],
          whyItMatters: 'The core message — that temperament beats intelligence in finance — applies broadly to any domain where compounding effects exist, including knowledge work. The parallel to building a knowledge base is direct: small consistent deposits of learning compound into expertise over years.'
        },
        transcript: [
          { time: '00:00', text: 'Thank you for having me. I want to start with a story about Ronald Read...' },
          { time: '04:10', text: 'Ronald Read was a janitor who amassed eight million dollars. How? He simply never sold...' },
        ]
      },
      {
        id: 'ep4',
        title: null,
        file: 'team-standup-2026-06-01.mp3',
        duration: '23m',
        date: 'Just now',
        status: 'transcribing',
        folder: null,
        progress: 45,
        summary: null,
        transcript: []
      },
      {
        id: 'ep5',
        title: null,
        file: 'client-call-notes.m4a',
        duration: '38m',
        date: 'Just now',
        status: 'queued',
        folder: null,
        progress: 0,
        summary: null,
        transcript: []
      }
    ];

    const folders = [
      { id: 'podcasts', name: 'Podcasts', parent: null, expanded: true },
      { id: 'books', name: 'Audiobooks', parent: null, expanded: false },
      { id: 'meetings', name: 'Meetings', parent: null, expanded: false },
    ];

    let openTabs = [
      { id: 'ep1', preview: false },
      { id: 'ep2', preview: true },
    ];
    let activeTabId = 'ep1';
    let settingsOpen = false;

    // --- RENDER ---
    function render() {
      renderSidebar();
      renderTabs();
      renderContent();
    }

    function renderSidebar() {
      const tree = document.getElementById('sidebar-tree');

      // Inbox section
      const inboxItems = episodes.filter(e => e.folder === null);
      const folderItems = (folderId) => episodes.filter(e => e.folder === folderId && e.status === 'complete');

      let html = '';

      // Inbox
      html += `<div class="mb-4">`;
      html += `<div class="sidebar-item flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-heading font-medium text-secondary uppercase tracking-wide">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-6l-2 3H10l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
        Inbox ${inboxItems.length > 0 ? `<span class="ml-auto bg-surface text-secondary px-1.5 py-0.5 rounded text-[10px]">${inboxItems.length}</span>` : ''}
      </div>`;

      inboxItems.forEach(ep => {
        const isActive = activeTabId === ep.id && !settingsOpen;
        html += renderSidebarEpisode(ep, isActive);
      });
      html += `</div>`;

      // Folders
      html += `<div class="mb-2">
        <div class="px-3 py-1.5 text-xs font-heading font-medium text-secondary uppercase tracking-wide">Folders</div>
      </div>`;

      folders.filter(f => f.parent === null).forEach(folder => {
        const children = folderItems(folder.id);
        html += `<div class="mb-1">`;
        html += `<div class="sidebar-item flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm text-text cursor-pointer" onclick="toggleFolder('${folder.id}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="transition-transform ${folder.expanded ? 'rotate-90' : ''}"><path d="m9 18 6-6-6-6"/></svg>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          ${folder.name}
          <span class="ml-auto text-[10px] text-secondary">${children.length}</span>
        </div>`;

        html += `<div class="folder-children ${folder.expanded ? 'expanded' : 'collapsed'} pl-4">`;
        children.forEach(ep => {
          const isActive = activeTabId === ep.id && !settingsOpen;
          html += renderSidebarEpisode(ep, isActive);
        });
        html += `</div></div>`;
      });

      tree.innerHTML = html;
    }

    function renderSidebarEpisode(ep, isActive) {
      let statusIcon = '';
      if (ep.status === 'transcribing') {
        statusIcon = `<div class="flex gap-0.5 items-center"><span class="processing-dot w-1.5 h-1.5 rounded-full bg-accent"></span><span class="text-[10px] text-accent ml-1">${ep.progress}%</span></div>`;
      } else if (ep.status === 'queued') {
        statusIcon = `<span class="text-[10px] text-secondary">Queued</span>`;
      } else if (ep.status === 'summarizing') {
        statusIcon = `<div class="flex gap-0.5 items-center"><span class="processing-dot w-1.5 h-1.5 rounded-full bg-accent"></span><span class="text-[10px] text-accent ml-1">Summarizing</span></div>`;
      }

      const title = ep.title || ep.file;
      return `<div class="sidebar-item flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm cursor-pointer ${isActive ? 'active' : ''}" onclick="selectEpisode('${ep.id}')" ondblclick="pinEpisode('${ep.id}')">
        <span class="truncate flex-1 ${ep.status !== 'complete' ? 'text-secondary' : 'text-text'}">${title}</span>
        ${statusIcon}
      </div>`;
    }

    function renderTabs() {
      const tabBar = document.getElementById('tab-bar');
      let html = '';

      openTabs.forEach(tab => {
        const ep = episodes.find(e => e.id === tab.id);
        if (!ep) return;
        const isActive = activeTabId === tab.id && !settingsOpen;
        const title = ep.title || ep.file;
        html += `<div class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs cursor-pointer transition-colors ${isActive ? 'bg-surface text-text' : 'text-secondary hover:text-text hover:bg-surface/50'} ${tab.preview ? 'tab-preview' : ''}" onclick="activateTab('${tab.id}')">
          <span class="truncate max-w-[120px]">${title}</span>
          <svg onclick="event.stopPropagation(); closeTab('${tab.id}')" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="opacity-0 hover:opacity-100 shrink-0" style="opacity: ${isActive ? '0.5' : '0'}"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </div>`;
      });

      // Settings tab (only shown when open)
      if (settingsOpen) {
        html += `<div class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs cursor-pointer transition-colors bg-surface text-text" onclick="openSettings()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          <span>Settings</span>
          <svg onclick="event.stopPropagation(); closeSettings()" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="opacity-50 hover:opacity-100 shrink-0"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </div>`;
      }

      tabBar.innerHTML = html;
    }

    function renderContent() {
      const pane = document.getElementById('content-pane');

      if (settingsOpen) {
        pane.innerHTML = renderSettings();
        return;
      }

      const ep = episodes.find(e => e.id === activeTabId);
      if (!ep) {
        pane.innerHTML = renderEmptyState();
        return;
      }

      if (ep.status !== 'complete') {
        pane.innerHTML = renderProcessingState(ep);
        return;
      }

      pane.innerHTML = renderEpisodeDetail(ep);
    }

    function renderEpisodeDetail(ep) {
      const transcriptHtml = ep.transcript.map(t =>
        `<div class="flex gap-3 text-sm py-1">
          <span class="shrink-0 font-mono text-xs text-secondary">${t.time}</span>
          <span class="text-text">${t.text}</span>
        </div>`
      ).join('');

      const detailsHtml = ep.summary.details.map(d =>
        `<li class="text-text leading-relaxed">${d}</li>`
      ).join('');

      return `
        <div class="flex-1 overflow-y-auto px-12 py-8">
          <!-- Title -->
          <div class="editable-title flex items-center gap-2 mb-2 cursor-text group">
            <h1 class="font-heading text-2xl font-semibold text-text">${ep.title}</h1>
            <svg class="pencil-icon text-secondary" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
          </div>

          <!-- Metadata -->
          <div class="flex items-center gap-3 text-xs text-secondary mb-8">
            <span>${ep.file}</span>
            <span class="w-1 h-1 rounded-full bg-secondary"></span>
            <span>${ep.duration}</span>
            <span class="w-1 h-1 rounded-full bg-secondary"></span>
            <span>${ep.date}</span>
          </div>

          <!-- Summary: The Rundown -->
          <div class="mb-8">
            <h2 class="font-heading text-sm font-semibold text-accent uppercase tracking-wide mb-3">The Rundown</h2>
            <p class="text-text leading-relaxed text-[15px]">${ep.summary.rundown}</p>
          </div>

          <!-- Summary: The Details -->
          <div class="mb-8">
            <h2 class="font-heading text-sm font-semibold text-accent uppercase tracking-wide mb-3">The Details</h2>
            <ul class="list-disc list-outside pl-5 space-y-2 text-[15px]">
              ${detailsHtml}
            </ul>
          </div>

          <!-- Summary: Why It Matters -->
          <div class="mb-8">
            <h2 class="font-heading text-sm font-semibold text-accent uppercase tracking-wide mb-3">Why It Matters</h2>
            <p class="text-text leading-relaxed text-[15px]">${ep.summary.whyItMatters}</p>
          </div>

          <!-- Transcript (collapsed) -->
          <div class="mb-8 border-t border-surface pt-6">
            <div class="flex items-center gap-2 cursor-pointer" onclick="toggleTranscript()">
              <svg id="transcript-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-secondary transition-transform"><path d="m9 18 6-6-6-6"/></svg>
              <h2 class="font-heading text-sm font-semibold text-secondary">Transcript</h2>
              <span class="text-[10px] text-secondary ml-1">${ep.transcript.length} segments</span>
            </div>
            <div id="transcript-body" class="transcript-body mt-3 pl-5">
              ${transcriptHtml}
            </div>
          </div>
        </div>

        <!-- Chat placeholder (pinned bottom) -->
        <div class="shrink-0 px-12 py-4 border-t border-surface">
          <div class="flex items-center gap-3 px-4 py-3 rounded-app bg-surface text-secondary text-sm cursor-not-allowed opacity-60">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            <span>Ask about this episode... (coming soon)</span>
          </div>
        </div>
      `;
    }

    function renderProcessingState(ep) {
      const statusText = ep.status === 'queued' ? 'Waiting in queue...' :
                         ep.status === 'transcribing' ? `Transcribing... ${ep.progress}%` :
                         'Generating summary...';

      return `
        <div class="flex-1 flex flex-col items-center justify-center px-12">
          <div class="w-full max-w-md text-center">
            <div class="w-12 h-12 rounded-app bg-surface flex items-center justify-center mx-auto mb-4">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-accent processing-dot"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
            </div>
            <p class="font-heading text-sm font-medium text-text mb-2">${ep.file}</p>
            <p class="text-sm text-secondary mb-4">${statusText}</p>
            ${ep.status === 'transcribing' ? `
              <div class="w-full h-2 rounded-full bg-surface overflow-hidden">
                <div class="h-full rounded-full bg-accent transition-all" style="width: ${ep.progress}%"></div>
              </div>
            ` : ''}
          </div>
        </div>
      `;
    }

    function renderEmptyState() {
      return `
        <div class="flex-1 flex flex-col items-center justify-center px-12">
          <div class="text-center max-w-sm">
            <div class="w-16 h-16 rounded-app bg-surface flex items-center justify-center mx-auto mb-6">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-accent"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
            </div>
            <h2 class="font-heading text-xl font-semibold text-text mb-2">Your knowledge base is empty</h2>
            <p class="text-sm text-secondary mb-6">Add an audio file to get started. It will be transcribed and summarized automatically.</p>
            <button onclick="addFile()" class="px-5 py-2.5 rounded-app bg-accent text-white font-heading text-sm font-medium hover:opacity-90 transition-opacity">
              Add Your First Audio File
            </button>
          </div>
        </div>
      `;
    }

    function renderSettings() {
      return `
        <div class="flex-1 overflow-y-auto px-12 py-8">
          <h1 class="font-heading text-2xl font-semibold text-text mb-8">Settings</h1>

          <!-- API Key -->
          <div class="mb-8">
            <label class="block font-heading text-sm font-medium text-text mb-2">OpenRouter API Key</label>
            <input type="password" value="sk-or-v1-xxxx...xxxx" class="w-full max-w-lg px-4 py-2.5 rounded-app bg-surface border border-surface text-text text-sm outline-none focus:border-accent transition-colors" placeholder="sk-or-v1-...">
            <p class="text-xs text-secondary mt-1.5">Your API key is stored locally and never sent anywhere except OpenRouter.</p>
          </div>

          <!-- Model -->
          <div class="mb-8">
            <label class="block font-heading text-sm font-medium text-text mb-2">Summarization Model</label>
            <select class="w-full max-w-lg px-4 py-2.5 rounded-app bg-surface border border-surface text-text text-sm outline-none focus:border-accent transition-colors appearance-none">
              <option>google/gemini-3.5-flash</option>
              <option>anthropic/claude-sonnet-4</option>
              <option>anthropic/claude-haiku-4</option>
              <option>openai/gpt-4.1-mini</option>
            </select>
            <p class="text-xs text-secondary mt-1.5">Used for generating titles and summaries. Gemini 3.5 Flash recommended for speed and cost.</p>
          </div>

          <!-- Custom Instructions -->
          <div class="mb-8">
            <label class="block font-heading text-sm font-medium text-text mb-2">Custom Instructions</label>
            <textarea rows="5" class="w-full max-w-lg px-4 py-2.5 rounded-app bg-surface border border-surface text-text text-sm outline-none focus:border-accent transition-colors resize-none" placeholder="Additional instructions appended to the summarization prompt..."></textarea>
            <p class="text-xs text-secondary mt-1.5">These are added to the default prompt. Example: "Also extract action items" or "Summarize in English regardless of source language."</p>
          </div>
        </div>
      `;
    }

    // --- INTERACTIONS ---
    function selectEpisode(id) {
      settingsOpen = false;
      // Single click = preview (replaces existing preview tab, or becomes one)
      const existingTab = openTabs.find(t => t.id === id);
      if (existingTab) {
        activeTabId = id;
      } else {
        // Replace existing preview tab, or add new preview
        const previewIdx = openTabs.findIndex(t => t.preview);
        if (previewIdx >= 0) {
          openTabs[previewIdx] = { id, preview: true };
        } else {
          openTabs.push({ id, preview: true });
        }
        activeTabId = id;
      }
      render();
    }

    function pinEpisode(id) {
      settingsOpen = false;
      const tab = openTabs.find(t => t.id === id);
      if (tab) {
        tab.preview = false;
      } else {
        openTabs.push({ id, preview: false });
      }
      activeTabId = id;
      render();
    }

    function activateTab(id) {
      settingsOpen = false;
      activeTabId = id;
      render();
    }

    function closeTab(id) {
      openTabs = openTabs.filter(t => t.id !== id);
      if (activeTabId === id) {
        activeTabId = openTabs.length > 0 ? openTabs[openTabs.length - 1].id : null;
      }
      render();
    }

    function openSettings() {
      settingsOpen = true;
      render();
    }

    function closeSettings() {
      settingsOpen = false;
      // Return to active episode tab, or show empty state
      if (openTabs.length > 0) {
        activeTabId = openTabs[openTabs.length - 1].id;
      }
      render();
    }

    function toggleFolder(folderId) {
      const folder = folders.find(f => f.id === folderId);
      if (folder) folder.expanded = !folder.expanded;
      render();
    }

    function toggleTranscript() {
      const body = document.getElementById('transcript-body');
      const chevron = document.getElementById('transcript-chevron');
      if (body.classList.contains('expanded')) {
        body.classList.remove('expanded');
        chevron.style.transform = '';
      } else {
        body.classList.add('expanded');
        chevron.style.transform = 'rotate(90deg)';
      }
    }

    function addFile() {
      alert('Native file dialog would open here.\nSelected files go to Inbox and start processing.');
    }

    function filterSidebar(query) {
      // Simple filter — in production this would search content too
      // For prototype, just re-render (no filtering logic)
    }

    // --- INIT ---
    render();

    // Simulate processing progress
    setInterval(() => {
      const ep4 = episodes.find(e => e.id === 'ep4');
      if (ep4 && ep4.status === 'transcribing' && ep4.progress < 100) {
        ep4.progress += 2;
        if (ep4.progress >= 100) {
          ep4.status = 'summarizing';
          setTimeout(() => {
            ep4.status = 'complete';
            ep4.title = 'Team Standup: Sprint 42 Progress & Blockers';
            ep4.summary = {
              rundown: 'Weekly team standup covering Sprint 42 progress. Backend migration is 80% complete, frontend blocked on design review, and the QA team raised concerns about test coverage in the new auth module.',
              details: [
                'Backend migration to new API gateway running ahead of schedule — expected completion Wednesday',
                'Frontend team blocked for 2 days waiting on finalized design specs for the settings page',
                'QA flagged that new auth module has only 45% test coverage vs. the 80% team standard',
                'Decision made to extend sprint by 2 days rather than cut scope on the auth feature'
              ],
              whyItMatters: 'The sprint extension sets a precedent for prioritizing quality over velocity. The auth module coverage gap is a real risk — a bug there hits every user. Worth monitoring whether the design review bottleneck recurs next sprint.'
            };
            ep4.transcript = [
              { time: '00:00', text: 'Alright everyone, let\'s get started. Quick round-robin, starting with backend...' },
              { time: '02:15', text: 'Migration is going well. We finished the user service yesterday and payments is next...' },
            ];
            render();
          }, 3000);
        }
        if (activeTabId === 'ep4') render();
        else renderSidebar();
      }
    }, 500);
  </script>
</body>
</html>
